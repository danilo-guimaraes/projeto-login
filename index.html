<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/esitlos/style.css">
    <link rel="stylesheet" href="/esitlos/media-query.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <title>Login</title>
</head>

<body>
    <main>
        <section id="login">

            <div id="imagem">
                <!-- Feito no CSS -->
            </div>

            <div id="formulario">
                <h3>Seja bem vindo(a)</h3>

                <p>Faça login para acessar sua conta e poder fazer as configurações no seu
                    ambiente.</p>

                <form action="login.php" method="post" autocomplete="on">
                    <div class="campo">
                        <span class="material-symbols-outlined">
                            person
                        </span>

                        <input type="email" name="login" id="ilogin" placeholder="seu e-mail" autocomplete="email"
                            required maxlength="30">

                        <label for="ilogin">Login</label>

                    </div>

                    <div class="campo">

                        <span class="material-symbols-outlined">
                            vpn_key
                        </span>

                        <input type="password" name="senha" id="isenha" placeholder="Sua Senha"
                            autocomplete="current-password" required minlength="8" maxlength="20">

                        <label for="isenha">Senha</label>
                    </div>

                    <input type="submit" value="Entrar">
                    <a class="botao" href="esqueci.html">Esqueci a senha
                        <span class="material-symbols-outlined">Mail</span>
                    </a>

                </form>
            </div>
        </section>
    </main>

</body>

</html>
